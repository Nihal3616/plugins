```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Plugins Demo</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MySite</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <!-- ✅ TOOLTIP -->
  <button class="btn btn-info mb-3" data-bs-toggle="tooltip" title="This is a tooltip">
    Hover me (Tooltip)
  </button>

  <!-- ✅ MODAL BUTTON -->
  <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#myModal">
    Open Modal
  </button>

  <!-- MODAL -->
  <div class="modal fade" id="myModal">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Bootstrap Modal</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          This is a modal plugin example.
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>

      </div>
    </div>
  </div>

  <!-- ✅ COLLAPSE -->
  <p>
    <button class="btn btn-warning" data-bs-toggle="collapse" data-bs-target="#collapseExample">
      Toggle Collapse
    </button>
  </p>

  <div class="collapse" id="collapseExample">
    <div class="card card-body">
      This is collapsible content.
    </div>
  </div>

  <!-- ✅ CAROUSEL -->
  <div id="carouselExample" class="carousel slide mt-4" data-bs-ride="carousel">
    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="https://via.placeholder.com/800x300" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="https://via.placeholder.com/800x300/ff0000" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="https://via.placeholder.com/800x300/0000ff" class="d-block w-100">
      </div>

    </div>

    <button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Enable Tooltip -->
<script>
  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
  tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el));
</script>

</body>
</html>
```
